name: Codex Task Runner

on:
  issues:
    types: [labeled]

jobs:
  run-codex:
    if: github.event.label.name == 'codex-run'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Extract issue data
        run: |
          echo "ISSUE_TITLE=${{ github.event.issue.title }}" >> $GITHUB_ENV
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUE_NUMBER=${{ github.event.issue.number }}" >> $GITHUB_ENV

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are working on a GitHub issue.
            Project config:
            Read /project-config.md first.

            Title:
            ${{ github.event.issue.title }}

            Description:
            ${{ github.event.issue.body }}

            Instructions:
            - Implement the task
            - Follow project structure
            - Add or update tests if needed
            - Keep changes minimal
            - Do not break existing code
            - Summarize what you changed
            - Implement the issue in project code only
            - Do not modify files under .github/workflows
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Commit changes
        run: |
          BRANCH="feature/issue-${ISSUE_NUMBER}-${{ github.run_number }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git restore --staged .github/workflows/codex-run.yml || true
          git checkout -- .github/workflows/codex-run.yml || true
          rm -f codex-output.md

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Codex: issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Codex: Issue #${ISSUE_NUMBER}" \
            --body "Auto-generated by Codex for issue #${ISSUE_NUMBER}")

          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          echo "$PR_URL"

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment $ISSUE_NUMBER \
            --body "🚀 PR created: $PR_URL"
