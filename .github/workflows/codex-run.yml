name: Codex Task Runner

on:
  issues:
    types: [labeled]

jobs:
  run-codex:
    if: github.event.label.name == 'codex-run'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is missing or empty"
            exit 1
          fi
          echo "OPENAI_API_KEY is present"

      - name: Check project config
        run: |
          if [ ! -f project-config.md ]; then
            echo "project-config.md missing"
            exit 1
          fi

      - name: Build prompt file
        run: |
          cat > codex-prompt.txt <<EOF
          You are working on GitHub issue #${{ github.event.issue.number }}.

          IMPORTANT:
          - DO NOT modify any file inside .github/
          - DO NOT modify workflows
          - DO NOT create CI/CD workflows
          - If workflow changes are needed, mention them only in the summary

          Project config:
          Read project-config.md and follow it strictly.

          Issue title:
          ${{ github.event.issue.title }}

          Issue description:
          ${{ github.event.issue.body }}

          Labels:
          ${{ join(github.event.issue.labels.*.name, ', ') }}

          Additional routing rules:
          - If label area:frontend is present, work only in frontend/
          - If label area:backend is present, work only in backend/
          - If label area:fullstack is present, you may touch both frontend/ and backend/

          Instructions:
          - Make only the minimum necessary code changes to complete the task
          - Follow the existing project structure and coding style
          - Do not refactor unrelated files
          - If the task is ambiguous, choose the safest small implementation that matches the issue text
          - Add or update tests if needed
          - Do not break existing code
          - Summarize what changed
          EOF

      - name: Record start time
        run: |
          echo "START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.txt
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Create branch and commit changes
        id: commit_changes
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BRANCH="feature/issue-${ISSUE_NUMBER}-${{ github.run_number }}"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          # Never allow workflow changes
          git restore --staged .github/workflows/* || true
          git checkout -- .github/workflows/* || true

          # Remove generated helper files
          git restore --staged codex-output.md codex-prompt.txt || true
          rm -f codex-output.md codex-prompt.txt

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Codex: issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.commit_changes.outputs.has_changes == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}

          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.commit_changes.outputs.branch_name }}" \
            --title "Codex: Issue #${ISSUE_NUMBER}" \
            --body "Auto-generated by Codex for issue #${ISSUE_NUMBER}

          Fixes #${ISSUE_NUMBER}")

          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "$PR_URL"

      - name: Update issue labels for review
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label codex-run \
            --add-label needs-review

      - name: Comment on issue with PR and timing
        if: steps.commit_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          END_EPOCH=$(date +%s)
          ELAPSED_MIN=$(( (END_EPOCH - START_EPOCH) / 60 ))
          gh issue comment ${{ github.event.issue.number }} \
            --body "🚀 PR created: $PR_URL

          ⏱️ Automation runtime: ${ELAPSED_MIN} min"

      - name: Show Codex output
        if: always()
        run: |
          if [ -f codex-output.md ]; then
            cat codex-output.md
          else
            echo "codex-output.md not found"
          fi

      - name: Show git diff
        if: always()
        run: |
          git status
          git diff --stat
          git diff
