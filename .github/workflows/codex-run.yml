name: Codex Task Runner

on:
  issues:
    types: [labeled]

jobs:
  run-codex:
    if: github.event.label.name == 'codex-run'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check project config
        run: |
          test -f project-config.md || { echo "project-config.md missing"; exit 1; }

      - name: Build prompt file
        run: |
          cat > codex-prompt.txt <<EOF
          You are working on a GitHub issue.

          Project config:
          Read /project-config.md first.

          Title:
          ${{ github.event.issue.title }}

          Description:
          ${{ github.event.issue.body }}

          Instructions:
          - Implement the task
          - Follow project structure
          - Add or update tests if needed
          - Keep changes minimal
          - Do not break existing code
          - Summarize what you changed
          - Implement the issue in project code only
          - Do not modify files under .github/workflows
          EOF

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.txt
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      - name: Commit changes
        run: |
          BRANCH="feature/issue-${{ github.event.issue.number }}-${{ github.run_number }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git restore --staged codex-output.md || true
          git restore --staged .github/workflows/* || true
          rm -f codex-output.md
          git checkout -- .github/workflows/* || true

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Codex: issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Codex: Issue #${{ github.event.issue.number }}" \
            --body "Auto-generated by Codex for issue #${{ github.event.issue.number }}")
          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          echo "$PR_URL"

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🚀 PR created: $PR_URL"
