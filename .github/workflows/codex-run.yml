name: Codex Task Runner

on:
  issues:
    types: [labeled]

jobs:
  run-codex:
    if: github.event.label.name == 'codex-run'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      # ✅ Ensure project config exists (prevents random AI behavior)
      - name: Check project config
        run: |
          if [ ! -f project-config.md ]; then
            echo "❌ project-config.md missing"
            exit 1
          fi

      # ✅ Build prompt file (MOST IMPORTANT FIX)
      - name: Build prompt file
        run: |
          cat > codex-prompt.txt <<EOF
          You are working on GitHub issue #${{ github.event.issue.number }}.

          IMPORTANT:
          - DO NOT modify any file inside .github/
          - DO NOT modify workflows
          - If workflow changes are needed, mention them only

          Project config:
          Read project-config.md and follow it strictly.

          Title:
          ${{ github.event.issue.title }}

          Description:
          ${{ github.event.issue.body }}

          Instructions:
          - Implement only application code
          - If project is empty, initialize structure first
          - Keep changes minimal
          - Add tests if possible
          - Do not break existing code
          - Follow project-config.md strictly
          - Summarize what you changed
          EOF

      # ✅ Run Codex
      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: codex-prompt.txt
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          codex-args: '["--full-auto"]'

      # ✅ Commit changes safely
      - name: Commit changes
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BRANCH="feature/issue-${ISSUE_NUMBER}-${{ github.run_number }}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          # 🚫 NEVER allow workflow changes
          git restore --staged .github/workflows/* || true
          git checkout -- .github/workflows/* || true

          # 🚫 Remove codex output file
          git restore --staged codex-output.md || true
          rm -f codex-output.md

          # ✅ Exit if nothing changed
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Codex: issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

      # ✅ Create Pull Request
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Codex: Issue #${ISSUE_NUMBER}" \
            --body "Auto-generated by Codex for issue #${ISSUE_NUMBER}")

          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          echo "$PR_URL"

      # ✅ Comment back on Issue
      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "🚀 PR created: $PR_URL"
